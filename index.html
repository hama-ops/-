<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>家計簿</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家計簿" />
  <meta name="theme-color" content="#0f1117" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --card: #181b27;
      --card2: #1e2130;
      --border: #2a2d3e;
      --text: #f0ede8;
      --muted: #888;
      --dim: #555;
      --income: #7ec8a4;
      --expense: #e07b7b;
      --accent: #e8b84b;
      --accent2: #e07b54;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; }
    body { max-width: 480px; margin: 0 auto; position: relative; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--card2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #app { padding-bottom: calc(70px + var(--safe-bottom)); }

    /* Header */
    .header { padding: 52px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
    .header-title-sub { font-size: 11px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
    .header-title { font-size: 22px; font-weight: 700; }
    .month-nav { display: flex; align-items: center; gap: 6px; }
    .month-btn { background: var(--card2); color: var(--text); padding: 6px 12px; border-radius: 8px; font-size: 16px; }
    .month-label { font-size: 13px; min-width: 72px; text-align: center; }

    /* Pages */
    .page { display: none; padding: 0 16px; flex-direction: column; gap: 14px; }
    .page.active { display: flex; }

    /* Card */
    .card { background: var(--card); border-radius: 16px; padding: 20px; }

    /* Balance card */
    .balance-card {
      background: linear-gradient(135deg, #1e2340, #2a1e30);
      border-radius: 20px; padding: 24px; position: relative; overflow: hidden;
    }
    .balance-card::before {
      content: ''; position: absolute; top: -20px; right: -20px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, #e8b84b22, transparent 70%);
      border-radius: 50%;
    }
    .balance-label { font-size: 12px; color: var(--muted); letter-spacing: .1em; margin-bottom: 8px; }
    .balance-amount { font-size: 36px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .balance-amount.positive { color: var(--income); }
    .balance-amount.negative { color: var(--expense); }
    .balance-amount span { font-size: 16px; margin-left: 4px; }
    .balance-row { display: flex; gap: 24px; margin-top: 16px; }
    .balance-item-label { font-size: 11px; color: var(--muted); }
    .balance-item-value { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; }

    /* Category bar */
    .cat-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
    .cat-bar-track { height: 4px; background: var(--card2); border-radius: 2px; margin-bottom: 10px; }
    .cat-bar-fill { height: 100%; border-radius: 2px; }

    /* Record list */
    .record-item { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--card2); }
    .record-item:last-child { border-bottom: none; }
    .record-icon { width: 40px; height: 40px; background: var(--card2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .record-info { flex: 1; min-width: 0; }
    .record-name { font-size: 14px; font-weight: 500; }
    .record-sub { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-amount { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .record-amount.income { color: var(--income); }
    .record-amount.expense { color: var(--expense); }
    .icon-btn { color: var(--dim); font-size: 16px; padding: 4px 7px; border-radius: 6px; }
    .icon-btn:hover, .icon-btn:active { background: var(--card2); }
    .icon-btn.del:hover, .icon-btn.del:active { color: var(--expense); }
    .icon-btn.edit:hover, .icon-btn.edit:active { color: var(--accent); }

    /* Section title */
    .section-title { font-size: 12px; color: var(--muted); letter-spacing: .05em; margin-bottom: 12px; }

    /* Form */
    .field-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .05em; }
    .text-input { width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; }
    .text-input:focus { border-color: var(--accent); }
    .type-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .type-btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; transition: all .2s; border: 1.5px solid transparent; }
    .type-btn.income-btn { background: #1a3028; color: var(--income); border-color: #2a4a38; }
    .type-btn.income-btn.active { background: var(--income); color: var(--bg); }
    .type-btn.expense-btn { background: #2e1a1a; color: var(--expense); border-color: #4a2a2a; }
    .type-btn.expense-btn.active { background: var(--expense); color: var(--bg); }
    .cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
    .cat-btn { padding: 8px 4px; border-radius: 10px; background: var(--card2); color: #aaa; border: 1.5px solid transparent; text-align: center; font-size: 12px; transition: all .2s; }
    .cat-btn .cat-icon { font-size: 20px; }
    .cat-btn.active { border-color: var(--accent); color: var(--accent); background: #272318; }
    .submit-btn { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; width: 100%; }
    .cancel-btn { color: var(--dim); width: 100%; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 14px; }
    .form-field { margin-bottom: 16px; }

    /* Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--bg); border-top: 1px solid var(--card2);
      display: flex; justify-content: space-around;
      padding: 8px 8px calc(10px + var(--safe-bottom));
      z-index: 100;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 11px; padding: 7px 16px; border-radius: 12px; color: var(--dim); transition: all .2s; }
    .nav-item.active { background: var(--card2); color: var(--accent); }
    .nav-icon { font-size: 20px; }

    /* Empty state */
    .empty { color: var(--dim); font-size: 13px; text-align: center; padding: 28px 0; }

    /* Chart container */
    .chart-wrap { position: relative; width: 100%; }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #aaa; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* Toast */
    .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: var(--income); color: var(--bg); padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title-sub">My Kakeibo</div>
      <div class="header-title">家計簿</div>
    </div>
    <div class="month-nav">
      <button class="month-btn" id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" id="nextMonth">›</button>
    </div>
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="balance-card">
      <div class="balance-label">今月の収支</div>
      <div class="balance-amount" id="balanceAmount"><span>0</span><span>円</span></div>
      <div class="balance-row">
        <div>
          <div class="balance-item-label">収入</div>
          <div class="balance-item-value" id="incomeTotal" style="color:var(--income)">0</div>
        </div>
        <div>
          <div class="balance-item-label">支出</div>
          <div class="balance-item-value" id="expenseTotal" style="color:var(--expense)">0</div>
        </div>
      </div>
    </div>
    <div class="card" id="catSection" style="display:none">
      <div class="section-title">カテゴリ別支出</div>
      <div id="catBars"></div>
    </div>
    <div class="card">
      <div class="section-title">最近の取引</div>
      <div id="recentList"><div class="empty">取引がありません</div></div>
    </div>
  </div>

  <!-- ADD -->
  <div class="page" id="page-add">
    <div class="card">
      <div style="font-size:16px;font-weight:700;margin-bottom:20px" id="formTitle">収支を追加</div>
      <div class="type-row">
        <button class="type-btn expense-btn active" id="typeExpense" onclick="setType('expense')">− 支出</button>
        <button class="type-btn income-btn" id="typeIncome" onclick="setType('income')">＋ 収入</button>
      </div>
      <div class="form-field">
        <div class="field-label">金額</div>
        <input class="text-input" type="number" id="inputAmount" placeholder="0" inputmode="numeric" style="font-family:'DM Mono',monospace;font-size:22px" />
      </div>
      <div class="form-field">
        <div class="field-label">カテゴリ</div>
        <div class="cat-grid" id="catGrid"></div>
      </div>
      <div class="form-field">
        <div class="field-label">日付</div>
        <input class="text-input" type="date" id="inputDate" />
      </div>
      <div class="form-field">
        <div class="field-label">メモ（任意）</div>
        <input class="text-input" type="text" id="inputNote" placeholder="例：スーパーでの買い物" />
      </div>
      <button class="submit-btn" onclick="submitForm()" id="submitBtn">追加する</button>
      <button class="cancel-btn" id="cancelBtn" style="display:none" onclick="cancelEdit()">キャンセル</button>
    </div>
  </div>

  <!-- CHART -->
  <div class="page" id="page-chart">
    <div class="card">
      <div class="section-title">カテゴリ別支出（円グラフ）</div>
      <div class="chart-wrap" style="height:220px">
        <canvas id="pieChart"></canvas>
      </div>
      <div class="legend" id="pieLegend"></div>
    </div>
    <div class="card">
      <div class="section-title" id="barTitle">年間月別収支</div>
      <div class="chart-wrap" style="height:220px">
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div class="page" id="page-list">
    <div class="card">
      <div class="section-title" id="listTitle">取引一覧</div>
      <div id="fullList"><div class="empty">取引がありません</div></div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('home',this)">
      <span class="nav-icon">🏠</span><span>ホーム</span>
    </button>
    <button class="nav-item" onclick="showPage('add',this)">
      <span class="nav-icon" style="font-size:24px;font-weight:300">＋</span><span>追加</span>
    </button>
    <button class="nav-item" onclick="showPage('chart',this)">
      <span class="nav-icon">📊</span><span>グラフ</span>
    </button>
    <button class="nav-item" onclick="showPage('list',this)">
      <span class="nav-icon">📋</span><span>一覧</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Data ─────────────────────────────────────────────
const STORAGE_KEY = 'kakeibo_v1';
const CATEGORIES = {
  expense: [
    {id:'food',label:'食費',icon:'🍱'},
    {id:'transport',label:'交通費',icon:'🚃'},
    {id:'housing',label:'住居費',icon:'🏠'},
    {id:'utility',label:'光熱費',icon:'💡'},
    {id:'entertainment',label:'娯楽',icon:'🎮'},
    {id:'health',label:'医療・健康',icon:'🏥'},
    {id:'clothing',label:'衣類',icon:'👗'},
    {id:'education',label:'教育',icon:'📚'},
    {id:'other_expense',label:'その他',icon:'🛍️'},
  ],
  income: [
    {id:'salary',label:'給与',icon:'💼'},
    {id:'freelance',label:'副業',icon:'💻'},
    {id:'bonus',label:'賞与',icon:'🎁'},
    {id:'other_income',label:'その他',icon:'💰'},
  ]
};
const COLORS = ['#e07b54','#e8b84b','#7ec8a4','#5ba8d4','#9b7ecf','#e07b98','#7eb8d4','#d4a07e','#7ed4c8'];

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function saveRecords() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch {}
}

let records = loadRecords();
let currentMonth = (() => {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
})();
let editId = null;
let formType = 'expense';
let formCategory = 'food';
let pieChartInstance = null;
let barChartInstance = null;

// ── Helpers ───────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString('ja-JP'); }
function getCat(type, id) { return CATEGORIES[type]?.find(c => c.id === id) || {label: id, icon: '📝'}; }
function filteredRecords() {
  return records.filter(r => r.date.startsWith(currentMonth)).sort((a,b) => b.date.localeCompare(a.date));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Month nav ─────────────────────────────────────────
function updateMonthLabel() {
  const [y,m] = currentMonth.split('-');
  document.getElementById('monthLabel').textContent = `${y}年${parseInt(m)}月`;
}
document.getElementById('prevMonth').onclick = () => {
  const [y,m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m-2);
  currentMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  updateMonthLabel(); refreshAll();
};
document.getElementById('nextMonth').onclick = () => {
  const [y,m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m);
  currentMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  updateMonthLabel(); refreshAll();
};

// ── Page nav ──────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(name === 'chart') renderCharts();
}

// ── Home ──────────────────────────────────────────────
function renderHome() {
  const recs = filteredRecords();
  const income = recs.filter(r => r.type === 'income').reduce((s,r) => s+r.amount, 0);
  const expense = recs.filter(r => r.type === 'expense').reduce((s,r) => s+r.amount, 0);
  const balance = income - expense;

  const ba = document.getElementById('balanceAmount');
  ba.innerHTML = `${balance >= 0 ? '+' : ''}${fmt(balance)}<span>円</span>`;
  ba.className = 'balance-amount ' + (balance >= 0 ? 'positive' : 'negative');
  document.getElementById('incomeTotal').textContent = '+' + fmt(income);
  document.getElementById('expenseTotal').textContent = '-' + fmt(expense);

  // Cat bars
  const catMap = {};
  recs.filter(r => r.type === 'expense').forEach(r => {
    catMap[r.category] = (catMap[r.category] || 0) + r.amount;
  });
  const catData = Object.entries(catMap).sort((a,b) => b[1]-a[1]).slice(0,5);
  const catSection = document.getElementById('catSection');
  if(catData.length === 0) { catSection.style.display = 'none'; }
  else {
    catSection.style.display = '';
    document.getElementById('catBars').innerHTML = catData.map(([id,val],i) => {
      const cat = getCat('expense', id);
      const pct = expense > 0 ? Math.round(val/expense*100) : 0;
      return `<div class="cat-bar-label"><span>${cat.icon} ${cat.label}</span><span style="font-family:'DM Mono',monospace;color:var(--expense)">${fmt(val)}円</span></div>
              <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${COLORS[i%COLORS.length]}"></div></div>`;
    }).join('');
  }

  // Recent
  const el = document.getElementById('recentList');
  const recent = recs.slice(0,5);
  if(recent.length === 0) { el.innerHTML = '<div class="empty">取引がありません</div>'; return; }
  el.innerHTML = recent.map(r => recordHTML(r, false)).join('');
}

function recordHTML(r, showActions) {
  const cat = getCat(r.type, r.category);
  const actions = showActions
    ? `<button class="icon-btn edit" onclick="editRecord('${r.id}')">✎</button>
       <button class="icon-btn del" onclick="deleteRecord('${r.id}')">✕</button>`
    : '';
  return `<div class="record-item">
    <div class="record-icon">${cat.icon}</div>
    <div class="record-info">
      <div class="record-name">${cat.label}</div>
      <div class="record-sub">${r.date}${r.note ? ' · '+r.note : ''}</div>
    </div>
    <div class="record-amount ${r.type}">${r.type==='income'?'+':'-'}${fmt(r.amount)}</div>
    ${actions}
  </div>`;
}

// ── Form ──────────────────────────────────────────────
function setType(type) {
  formType = type;
  document.getElementById('typeExpense').classList.toggle('active', type === 'expense');
  document.getElementById('typeIncome').classList.toggle('active', type === 'income');
  formCategory = type === 'income' ? 'salary' : 'food';
  renderCatGrid();
}

function renderCatGrid() {
  const cats = CATEGORIES[formType];
  document.getElementById('catGrid').innerHTML = cats.map(c =>
    `<button class="cat-btn${formCategory===c.id?' active':''}" onclick="selectCat('${c.id}')">
      <div class="cat-icon">${c.icon}</div>
      <div>${c.label}</div>
    </button>`
  ).join('');
}

function selectCat(id) {
  formCategory = id;
  renderCatGrid();
}

function submitForm() {
  const amount = parseFloat(document.getElementById('inputAmount').value);
  if(!amount || amount <= 0) { showToast('金額を入力してください'); return; }
  const date = document.getElementById('inputDate').value;
  const note = document.getElementById('inputNote').value.trim();
  const record = { id: editId || Date.now().toString(), type: formType, amount, category: formCategory, date, note };
  if(editId) {
    records = records.map(r => r.id === editId ? record : r);
    editId = null;
    showToast('更新しました ✓');
  } else {
    records.unshift(record);
    showToast('追加しました ✓');
  }
  saveRecords();
  resetForm();
  showPage('home', document.querySelectorAll('.nav-item')[0]);
  refreshAll();
}

function resetForm() {
  editId = null;
  formType = 'expense';
  formCategory = 'food';
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('inputDate').value = todayStr();
  document.getElementById('formTitle').textContent = '収支を追加';
  document.getElementById('submitBtn').textContent = '追加する';
  document.getElementById('cancelBtn').style.display = 'none';
  setType('expense');
}

function cancelEdit() {
  resetForm();
}

function editRecord(id) {
  const r = records.find(x => x.id === id);
  if(!r) return;
  editId = id;
  formType = r.type;
  formCategory = r.category;
  document.getElementById('inputAmount').value = r.amount;
  document.getElementById('inputDate').value = r.date;
  document.getElementById('inputNote').value = r.note || '';
  document.getElementById('formTitle').textContent = '記録を編集';
  document.getElementById('submitBtn').textContent = '更新する';
  document.getElementById('cancelBtn').style.display = '';
  setType(r.type);
  showPage('add', document.querySelectorAll('.nav-item')[1]);
}

function deleteRecord(id) {
  if(!confirm('この記録を削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  saveRecords(); refreshAll();
  showToast('削除しました');
}

function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

// ── List ──────────────────────────────────────────────
function renderList() {
  const recs = filteredRecords();
  document.getElementById('listTitle').textContent = `取引一覧（${recs.length}件）`;
  const el = document.getElementById('fullList');
  if(recs.length === 0) { el.innerHTML = '<div class="empty">取引がありません</div>'; return; }
  el.innerHTML = recs.map(r => recordHTML(r, true)).join('');
}

// ── Charts ────────────────────────────────────────────
function renderCharts() {
  const recs = filteredRecords();
  const [y] = currentMonth.split('-');

  // Pie
  const catMap = {};
  recs.filter(r => r.type === 'expense').forEach(r => {
    catMap[r.category] = (catMap[r.category] || 0) + r.amount;
  });
  const pieData = Object.entries(catMap).sort((a,b) => b[1]-a[1]);

  if(pieChartInstance) { pieChartInstance.destroy(); pieChartInstance = null; }
  const pieCtx = document.getElementById('pieChart').getContext('2d');
  if(pieData.length === 0) {
    pieCtx.clearRect(0,0,300,220);
    pieCtx.fillStyle = '#555'; pieCtx.font = '13px sans-serif'; pieCtx.textAlign = 'center';
    pieCtx.fillText('支出データがありません', 150, 110);
    document.getElementById('pieLegend').innerHTML = '';
  } else {
    pieChartInstance = new Chart(pieCtx, {
      type: 'doughnut',
      data: {
        labels: pieData.map(([id]) => { const c = getCat('expense',id); return c.icon+' '+c.label; }),
        datasets: [{ data: pieData.map(([,v]) => v), backgroundColor: COLORS, borderWidth: 2, borderColor: '#181b27' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)}円` } }
        },
        cutout: '55%'
      }
    });
    document.getElementById('pieLegend').innerHTML = pieData.map(([id],i) => {
      const c = getCat('expense',id);
      return `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>${c.icon} ${c.label}</div>`;
    }).join('');
  }

  // Bar
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const barIncome = [], barExpense = [];
  months.forEach((_,i) => {
    const m = `${y}-${String(i+1).padStart(2,'0')}`;
    const mr = records.filter(r => r.date.startsWith(m));
    barIncome.push(mr.filter(r => r.type==='income').reduce((s,r)=>s+r.amount,0));
    barExpense.push(mr.filter(r => r.type==='expense').reduce((s,r)=>s+r.amount,0));
  });
  document.getElementById('barTitle').textContent = `${y}年 月別収支`;
  if(barChartInstance) { barChartInstance.destroy(); barChartInstance = null; }
  const barCtx = document.getElementById('barChart').getContext('2d');
  barChartInstance = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: '収入', data: barIncome, backgroundColor: '#7ec8a4', borderRadius: 4, maxBarThickness: 20 },
        { label: '支出', data: barExpense, backgroundColor: '#e07b7b', borderRadius: 4, maxBarThickness: 20 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#888', font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)}円` } }
      },
      scales: {
        x: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: '#1e2130' } },
        y: { ticks: { color: '#666', font: { size: 10 }, callback: v => v>=10000 ? (v/10000)+'万' : v }, grid: { color: '#1e2130' } }
      }
    }
  });
}

// ── Init ──────────────────────────────────────────────
function refreshAll() {
  renderHome();
  renderList();
}

updateMonthLabel();
renderCatGrid();
document.getElementById('inputDate').value = todayStr();
refreshAll();
</script>
